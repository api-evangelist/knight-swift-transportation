specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Knight-Swift Transportation
providerId: knight-swift-transportation
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Trucking
  - Transportation
  - Logistics
description: Knight-Swift does not publish API rate limits publicly. Throttling is applied per onboarded
  shipper / 3PL client and surfaced only inside the gated developer portal documentation.
sources:
  - https://developer.knight-swift.com
notes: Public rate-limit documentation is not available; the developer portal is not externally reachable.
  Reconcile from gated docs once authenticated access is obtained.
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Per-client API throttling
    scope: client
    metric: varies
    limit: 'see authenticated Knight-Swift developer portal documentation'
policies:
  - name: Backoff
    description: Implement exponential backoff with jitter on 429/5xx responses; honor Retry-After when
      present.
  - name: Idempotency
    description: For load-tender and status-update endpoints, use unique idempotency tokens per business
      transaction so retries do not create duplicate loads.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
