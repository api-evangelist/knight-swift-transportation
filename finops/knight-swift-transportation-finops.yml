specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Knight-Swift Transportation
providerId: knight-swift-transportation
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Transportation
  - Logistics
  - Freight
description: 'FinOps shape for Knight-Swift: per-load freight billing under a negotiated carrier-services
  agreement; API access bundled into the contract. No public tariff.'
sources:
  - https://developer.knight-swift.com
  - https://www.knight-swift.com
notes: Knight-Swift's freight invoicing is per-shipment under negotiated lane rates; API access fees
  (if any) are bundled. Reconcile from actual customer invoices and contract terms.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Knight-Swift Transportation Holdings Inc.
serviceCategory: Transportation & Logistics
billingModel:
  pricingCategory: Negotiated Per-Load
  billingFrequency: Per-Invoice
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Adjustment
focusColumns:
  ServiceName: Knight-Swift Transportation
  ServiceCategory: Transportation
  ProviderName: Knight-Swift Transportation
  PublisherName: Knight-Swift Transportation Holdings Inc.
  InvoiceIssuerName: Knight-Swift Transportation Holdings Inc.
  BillingCurrency: USD
meters:
  - name: loads_tendered
    unit: load
    aggregation: sum
    dimensions:
      - mode
      - lane
      - shipper
  - name: linehaul_charges
    unit: USD
    aggregation: sum
    dimensions:
      - mode
      - lane
  - name: accessorials
    unit: USD
    aggregation: sum
    dimensions:
      - accessorial_type
  - name: fuel_surcharge
    unit: USD
    aggregation: sum
    dimensions:
      - lane
  - name: api_calls
    unit: request
    aggregation: sum
    dimensions:
      - endpoint
      - shipper
principles:
  - name: Visibility
    description: Pull load and billing data from the Knight-Swift API (status, tender response, invoice)
      and reconcile against EDI 210 freight invoices to match expected vs actual lane rates.
  - name: Allocation
    description: Tag tendered loads with internal cost-center metadata (plant, BU, customer order) so
      freight spend can be attributed by business unit.
  - name: Optimization
    description: Use Knight-Swift Logistics' multi-carrier visibility to compare modes (TL/LTL/Intermodal),
      consolidate loads, and shift commodities to lower-cost lanes; review accessorial charges (detention,
      layover) for process fixes.
  - name: Accountability
    description: Logistics owners reconcile per-shipment invoices weekly, dispute incorrect accessorials,
      and feed lane performance back into the next contract negotiation.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
