provider: Knight-Swift Transportation
providerId: knight-swift-transportation
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Trucking
  - Transportation
  - Logistics
  - Freight
description: Knight-Swift Transportation is a Fortune 1000 truckload, less-than-truckload, intermodal,
  and logistics carrier. They do not publish a public API tariff; integrations (shipper EDI/API onboarding,
  load tendering, tracking) are provisioned per-customer through the carrier-services agreement and Knight-Swift
  Logistics' shipper portal. Freight rates are negotiated per-lane / per-load.
sources:
  - https://developer.knight-swift.com
  - https://www.knight-swift.com
notes: No public API pricing. The developer portal is not publicly reachable; API access is gated behind
  the carrier-services agreement. Reconcile from authenticated portal documentation when access is obtained.
plans:
  - id: knight-swift-shipper-integration
    name: Shipper / 3PL Integration
    type: enterprise
    description: API and EDI integration provisioned per shipper contract; freight charges are billed
      per load/lane separate from any platform fee.
    entries:
      - label: Per-load freight charge
        name: load_charge
        type: metered
        metric: load
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: contact sales
        userMultiplied: false
      - label: API / EDI integration fee
        name: integration_fee
        type: subscription
        metric: contract
        limit: -1
        timeFrame: month
        geo: US
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Knight-Swift Transportation API (load tender, tracking, status)
      - name: EDI 204 / 990 / 214 / 210 integration
      - name: Knight Logistics shipper portal access
